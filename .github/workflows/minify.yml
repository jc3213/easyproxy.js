name: minify-easyproxy.js

on:
  push:
    branches:
      - main
    paths:
      - 'easyproxy.js'
      - 'easyproxy.ie11.js'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install -g terser

      - run: npx terser easyproxy.js -o easyproxy.min.js

      - run: npx terser easyproxy.ie11.js -o easyproxy.ie11.min.js

      - run: |
          HASH=$(git log -n 1 --pretty=format:%h -- easyproxy.js)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add easyproxy.min.js
          git add easyproxy.ie11.min.js
          git diff --cached --quiet || git commit -m "Auto-generated easyproxy.min.js based on $HASH"
          git push
