name: minify-easyproxy.js

on:
  push:
    branches:
      - main
    paths:
      - 'easyproxy.js'
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 允许 Actions 推送代码

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'   # 显式指定 Node.js 24

      - run: npm install -g terser

      - run: npx terser easyproxy.js -o easyproxy.min.js

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add easyproxy.min.js
          git commit -m "Add minified easyproxy.js" || echo "No changes to commit"
          git push
