name: minify-easyproxy.js

on:
  push:
    branches:
      - main
    paths:
      - 'easyproxy.js'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install -g terser

      - run: npx terser easyproxy.js -o easyproxy.min.js

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add easyproxy.min.js
          git commit -m "minified easyproxy.js as easyproxy.min.js" || echo "No changes to commit"
          git push
